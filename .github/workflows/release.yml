name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npx turbo run build

      # On a push to main with pending changesets, this opens/updates a
      # "Version Packages" PR. On a push to main where that PR was just
      # merged (i.e. no pending changesets, versions already bumped), it
      # publishes every changed package to npm instead.
      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Attaches npm provenance (verifiable build-to-publish attestation)
          # to every package published from this workflow. Requires the
          # id-token: write permission above and npm >= 9.5.
          NPM_CONFIG_PROVENANCE: "true"
